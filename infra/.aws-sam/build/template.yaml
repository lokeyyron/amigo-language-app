AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Amigo free-tier backend - Cognito auth, DynamoDB sync, HTTP API
Parameters:
  AppName:
    Type: String
    Default: amigo
Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 128
Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName:
        Fn::Sub: ${AppName}-users
      AutoVerifiedAttributes:
      - email
      UsernameAttributes:
      - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: false
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName:
        Fn::Sub: ${AppName}-web
      UserPoolId:
        Ref: UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
      - ALLOW_USER_PASSWORD_AUTH
      - ALLOW_REFRESH_TOKEN_AUTH
      - ALLOW_USER_SRP_AUTH
  UserDataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: ${AppName}-user-data
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: userId
        AttributeType: S
      KeySchema:
      - AttributeName: userId
        KeyType: HASH
  SyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: ${AppName}-sync
      CodeUri: SyncFunction
      Handler: index.handler
      Environment:
        Variables:
          TABLE_NAME:
            Ref: UserDataTable
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: UserDataTable
      Events:
        GetSync:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /sync
            Method: GET
            Auth:
              Authorizer: CognitoAuth
        PutSync:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /sync
            Method: PUT
            Auth:
              Authorizer: CognitoAuth
    Metadata:
      SamResourceId: SyncFunction
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      CorsConfiguration:
        AllowOrigins:
        - '*'
        AllowHeaders:
        - Authorization
        - Content-Type
        AllowMethods:
        - GET
        - PUT
        - OPTIONS
      Auth:
        Authorizers:
          CognitoAuth:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer:
                Fn::Sub: https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}
              audience:
              - Ref: UserPoolClient
Outputs:
  UserPoolId:
    Value:
      Ref: UserPool
  UserPoolClientId:
    Value:
      Ref: UserPoolClient
  ApiUrl:
    Value:
      Fn::Sub: https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/prod
  Region:
    Value:
      Ref: AWS::Region
